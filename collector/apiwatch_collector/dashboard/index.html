<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APIWatch · 本地 API 观测看板</title>
<style>
:root{
  --bg:#f5f7fa; --panel:#ffffff; --border:#e4e7eb; --line:#eef1f4;
  --text:#1f2933; --muted:#7b8794; --head:#52606d; --thbg:#f0f4f8;
  --ok:#0b8043; --warn:#b06a00; --err:#cf1124; --accent:#2b6cb0;
}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  margin:0;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--panel);border-bottom:1px solid var(--border)}
header h1{font-size:18px;margin:0;font-weight:600}
header .sub{color:var(--muted);font-size:12px;margin-top:2px}
header .status{font-size:12px;color:var(--muted)}
header .status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:6px;vertical-align:middle}
header .status.off .dot{background:var(--err)}
main{padding:20px 28px;max-width:1200px;margin:0 auto}
.toolbar{display:flex;align-items:end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.control{display:flex;flex-direction:column;gap:4px}
.control label{font-size:12px;color:var(--muted)}
select,button{height:32px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-size:13px;padding:0 10px}
button{cursor:pointer}
button:hover{border-color:var(--accent)}
button.danger{color:var(--err)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.card .v{font-size:26px;font-weight:600}
.card .k{color:var(--muted);font-size:12px;margin-top:4px}
.card.err .v{color:var(--err)}
section{margin-bottom:26px}
section h2{font-size:14px;color:var(--head);margin:0 0 10px;font-weight:600}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th,td{padding:9px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;white-space:nowrap}
th{background:var(--thbg);color:var(--head);font-weight:600;position:sticky;top:0}
tbody tr:last-child td{border-bottom:none}
tbody tr.clickable{cursor:pointer}
tbody tr.clickable:hover{background:#f7fafc}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.route{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px}
.badge{display:inline-block;min-width:42px;text-align:center;padding:1px 8px;border-radius:6px;font-size:12px;font-weight:600}
.m-get{color:#0b8043} .m-post{color:#2b6cb0} .m-put{color:#b06a00} .m-delete{color:#cf1124} .m-patch{color:#805ad5}
.s2{color:var(--ok)} .s4{color:var(--warn)} .s5{color:var(--err);font-weight:600}
.err-rate{color:var(--err);font-weight:600}
.empty{padding:22px;text-align:center;color:var(--muted)}
.detail{background:#fbfcfd;border-top:1px dashed var(--border)}
.detail td{white-space:normal;font-size:12.5px;color:var(--head)}
.detail .kv{display:grid;grid-template-columns:110px 1fr;gap:4px 12px}
.detail .kv .k{color:var(--muted)}
.detail code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;word-break:break-all}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:820px){.two-col{grid-template-columns:1fr}}
footer{text-align:center;color:var(--muted);font-size:12px;padding:14px}
</style>
</head>
<body>
<header>
  <div>
    <h1>APIWatch · 本地 API 观测看板</h1>
    <div class="sub">开发态请求级观测 · 每 3 秒自动刷新</div>
  </div>
  <div class="status" id="conn"><span class="dot"></span><span id="conn-text">连接中…</span></div>
</header>

<main>
  <div class="toolbar">
    <div class="control">
      <label for="project-filter">Project</label>
      <select id="project-filter"><option value="">全部</option></select>
    </div>
    <div class="control">
      <label for="framework-filter">Framework</label>
      <select id="framework-filter"><option value="">全部</option></select>
    </div>
    <button id="refresh-btn" type="button">刷新</button>
    <button id="clear-btn" type="button" class="danger">清空数据</button>
  </div>

  <div class="cards" id="cards"></div>

  <section>
    <h2>接口聚合（按平均耗时降序，慢接口在前）</h2>
    <div class="panel">
      <table>
        <thead><tr>
          <th>接口</th><th class="num">次数</th><th class="num">平均(ms)</th>
          <th class="num">P95(ms)</th><th class="num">最大(ms)</th><th class="num">错误率</th>
        </tr></thead>
        <tbody id="apis"></tbody>
      </table>
    </div>
  </section>

  <div class="two-col">
    <section>
      <h2>错误接口排行</h2>
      <div class="panel">
        <table>
          <thead><tr><th>接口</th><th class="num">错误数</th><th class="num">错误率</th></tr></thead>
          <tbody id="errors"></tbody>
        </table>
      </div>
    </section>

    <section>
      <h2>慢接口 Top 5</h2>
      <div class="panel">
        <table>
          <thead><tr><th>接口</th><th class="num">平均(ms)</th><th class="num">P95(ms)</th></tr></thead>
          <tbody id="slow"></tbody>
        </table>
      </div>
    </section>
  </div>

  <section>
    <h2>最近请求（点击展开 trace 详情）</h2>
    <div class="panel">
      <table>
        <thead><tr>
          <th>方法</th><th>路径</th><th class="num">状态</th>
          <th class="num">耗时(ms)</th><th>时间</th><th>trace_id</th>
        </tr></thead>
        <tbody id="requests"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>APIWatch v0.3.0 Preview · 数据来自本地 collector</footer>

<script>
const API_BASE = "";  // 同源：由 collector 的 /dashboard 提供
const expanded = new Set();  // 记录已展开的请求 id，刷新后保持展开
const details = new Map();   // id -> /requests/{trace_id} 返回的详情

async function fetchJSON(path){
  try{
    const r = await fetch(API_BASE + path, {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){ return null; }
}

async function sendJSON(path, method){
  try{
    const r = await fetch(API_BASE + path, {method, cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){ return null; }
}

function selectedFilters(){
  return {
    project: document.getElementById("project-filter").value,
    framework: document.getElementById("framework-filter").value,
  };
}

function filteredPath(path, extra){
  const params = new URLSearchParams();
  const f = selectedFilters();
  if(f.project) params.set("project", f.project);
  if(f.framework) params.set("framework", f.framework);
  Object.entries(extra || {}).forEach(([k,v]) => params.set(k, v));
  const q = params.toString();
  return q ? `${path}?${q}` : path;
}

function renderOptions(id, values){
  const select = document.getElementById(id);
  const current = select.value;
  select.innerHTML = `<option value="">全部</option>` + (values || []).map(v =>
    `<option value="${esc(v)}">${esc(v)}</option>`
  ).join("");
  if(values && values.includes(current)) select.value = current;
}

async function loadFilters(){
  const data = await fetchJSON("/filters");
  if(!data) return;
  renderOptions("project-filter", data.projects || []);
  renderOptions("framework-filter", data.frameworks || []);
}

function setConn(ok){
  const el = document.getElementById("conn");
  el.classList.toggle("off", !ok);
  document.getElementById("conn-text").textContent = ok ? "collector 已连接" : "collector 未连接";
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]
  ));
}
function methodClass(m){
  const method = String(m || "").toLowerCase();
  return ["get","post","put","patch","delete"].includes(method) ? "m-" + method : "m-other";
}
function statusClass(s){ s=+s||0; return s>=500?"s5":(s>=400?"s4":"s2"); }
function pct(x){ return ((x||0)*100).toFixed(1) + "%"; }
function fx(x){ return (+(x||0)).toFixed(1); }
function apiName(a){ return a.route || a.path || "-"; }

function renderCards(s){
  if(!s){ return; }
  const items = [
    ["总请求", s.total_requests, false],
    ["平均耗时", fx(s.avg_duration_ms) + " ms", false],
    ["P95 耗时", fx(s.p95_duration_ms) + " ms", false],
    ["错误率", pct(s.error_rate), s.error_rate > 0],
    ["错误数", s.error_count, s.error_count > 0],
  ];
  document.getElementById("cards").innerHTML = items.map(([k,v,bad]) =>
    `<div class="card ${bad?"err":""}"><div class="v">${esc(v)}</div><div class="k">${esc(k)}</div></div>`
  ).join("");
}

function renderApis(data){
  const apis = (data && data.apis) || [];
  const tb = document.getElementById("apis");
  if(!apis.length){ tb.innerHTML = `<tr><td colspan="6" class="empty">暂无数据，去请求几个接口试试</td></tr>`; return; }
  tb.innerHTML = apis.map(a =>
    `<tr>
      <td class="route">${esc(apiName(a))}</td>
      <td class="num">${a.count}</td>
      <td class="num">${fx(a.avg_ms)}</td>
      <td class="num">${fx(a.p95_ms)}</td>
      <td class="num">${fx(a.max_ms)}</td>
      <td class="num ${a.error_rate>0?"err-rate":""}">${pct(a.error_rate)}</td>
    </tr>`
  ).join("");

  // 慢接口 Top 5（apis 已按 avg 降序）
  const slow = apis.slice(0,5);
  document.getElementById("slow").innerHTML = slow.length ? slow.map(a =>
    `<tr><td class="route">${esc(apiName(a))}</td><td class="num">${fx(a.avg_ms)}</td><td class="num">${fx(a.p95_ms)}</td></tr>`
  ).join("") : `<tr><td colspan="3" class="empty">暂无</td></tr>`;

  // 错误接口排行
  const errs = apis.filter(a => a.error_count > 0).sort((x,y)=>y.error_count-x.error_count);
  document.getElementById("errors").innerHTML = errs.length ? errs.map(a =>
    `<tr><td class="route">${esc(apiName(a))}</td><td class="num">${a.error_count}</td><td class="num err-rate">${pct(a.error_rate)}</td></tr>`
  ).join("") : `<tr><td colspan="3" class="empty">暂无错误 🎉</td></tr>`;
}

function detailRow(r){
  const detail = details.get(r.id);
  const spans = detail && Array.isArray(detail.spans) ? detail.spans : [];
  const d = spans[0] || r;
  return `<tr class="detail" data-detail="${r.id}"><td colspan="6">
    <div class="kv">
      <div class="k">project</div><div>${esc(d.project)} · <span class="route">${esc(d.framework)}</span></div>
      <div class="k">method/path</div><div><span class="badge ${methodClass(d.method)}">${esc(d.method)}</span> <span class="route">${esc(d.path)}</span></div>
      <div class="k">route</div><div class="route">${esc(d.route || "(未采集，用 path 兜底)")}</div>
      <div class="k">status</div><div class="${statusClass(d.status_code)}">${esc(d.status_code)}</div>
      <div class="k">duration</div><div>${fx(d.duration_ms)} ms</div>
      <div class="k">timestamp</div><div><code>${esc(d.timestamp)}</code></div>
      <div class="k">trace_id</div><div><code>${esc(d.trace_id)}</code></div>
      <div class="k">span_id</div><div><code>${esc(d.span_id)}</code></div>
      <div class="k">traceparent</div><div><code>${esc(d.traceparent)}</code></div>
      <div class="k">spans</div><div>${spans.length || 1}</div>
      ${d.error_type ? `<div class="k">error</div><div><code>${esc(d.error_type)}: ${esc(d.error_message)}</code></div>` : ""}
    </div>
  </td></tr>`;
}

function renderRequests(data){
  const reqs = (data && data.requests) || [];
  const tb = document.getElementById("requests");
  if(!reqs.length){ tb.innerHTML = `<tr><td colspan="6" class="empty">暂无请求记录</td></tr>`; return; }
  tb.innerHTML = reqs.map(r => {
    const t = (r.timestamp || "").replace("T"," ").slice(0,19);
    const trace = (r.trace_id || "").slice(0,12) + "…";
    const main =
      `<tr class="clickable" data-id="${r.id}">
        <td><span class="badge ${methodClass(r.method)}">${esc(r.method)}</span></td>
        <td class="route">${esc(r.path)}</td>
        <td class="num ${statusClass(r.status_code)}">${r.status_code}</td>
        <td class="num">${fx(r.duration_ms)}</td>
        <td>${esc(t)}</td>
        <td class="route">${esc(trace)}</td>
      </tr>`;
    return main + (expanded.has(r.id) ? detailRow(r) : "");
  }).join("");

  tb.querySelectorAll("tr.clickable").forEach(tr => {
    tr.addEventListener("click", async () => {
      const id = +tr.dataset.id;
      const req = reqs.find(r => r.id === id);
      if(expanded.has(id)){
        expanded.delete(id);
      }else{
        expanded.add(id);
        if(req && !details.has(id)){
          const detail = await fetchJSON("/requests/" + encodeURIComponent(req.trace_id));
          if(detail) details.set(id, detail);
        }
      }
      renderRequests(data);
    });
  });
}

async function refresh(){
  await loadFilters();
  const [summary, apis, requests] = await Promise.all([
    fetchJSON(filteredPath("/summary")),
    fetchJSON(filteredPath("/apis")),
    fetchJSON(filteredPath("/requests", {limit:"50"})),
  ]);
  setConn(summary !== null || apis !== null || requests !== null);
  renderCards(summary);
  renderApis(apis);
  renderRequests(requests);
}

async function clearData(){
  const f = selectedFilters();
  const scope = f.project ? `project=${f.project}` : "全部数据";
  if(!confirm(`确认清空 ${scope} 吗？`)) return;
  const path = f.project
    ? "/events?project=" + encodeURIComponent(f.project)
    : "/events";
  const result = await sendJSON(path, "DELETE");
  if(!result){
    alert("清空失败，请确认 collector 正在运行。");
    return;
  }
  expanded.clear();
  details.clear();
  await refresh();
}

document.getElementById("project-filter").addEventListener("change", () => {
  expanded.clear(); details.clear(); refresh();
});
document.getElementById("framework-filter").addEventListener("change", () => {
  expanded.clear(); details.clear(); refresh();
});
document.getElementById("refresh-btn").addEventListener("click", refresh);
document.getElementById("clear-btn").addEventListener("click", clearData);

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
